name: 📰 NLP 分析

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 02:00 = 北京时间 10:00
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run NLP Analysis
        run: python policy_nlp.py run

      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@github.com"
          git config --local user.name "github-actions[bot]"
          git add results/
          git diff --staged --quiet || git commit -m "📰 NLP 分析结果 [bot]"
          git push
